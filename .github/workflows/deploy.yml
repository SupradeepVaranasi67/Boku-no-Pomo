name: Deploy Pomo Timer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud with GKE auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Install kubectl
        run: |
          gcloud components install kubectl --quiet

      - name: Build and push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          IMAGE="us-central1-docker.pkg.dev/supra-demo-11/gke-cicd-repo/pomo-timer:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials gke-demo-lab --zone us-central1-a --project supra-demo-11
          kubectl set image deployment/pomo-timer pomo-timer=$IMAGE
          kubectl rollout status deployment/pomo-timer
