name: Build and Push Docker Image

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}   # 🔥 FROM GITHUB SECRETS

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Build Docker image
      run: docker build -t gcr.io/gcp-demo-project-487205/pomo-timer:${{ github.sha }} .

    - name: Push Docker image
      run: docker push gcr.io/gcp-demo-project-487205/pomo-timer:${{ github.sha }}

    - name: Update deployment.yaml
      run: |
        sed -i 's|image:.*|image: gcr.io/gcp-demo-project-487205/pomo-timer:${{ github.sha }}|' deployment.yaml

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add deployment.yaml
        git commit -m "Update image tag [skip ci]" || exit 0
        git push
