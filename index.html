<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Tomato Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="top-bar">
        <h1>Pomodoro Timer</h1>
        <button id="themeToggle">🌙</button>
    </div>

    <div class="card timer-card">
        <div id="modeDisplay" class="mode">Work Session</div>

        <div class="timer-wrapper">
            <svg class="progress-ring" width="220" height="220">
                <circle class="progress-bg" cx="110" cy="110" r="90"/>
                <circle class="progress-ring-circle" cx="110" cy="110" r="90"/>
            </svg>
            <div id="timer" class="timer">25:00</div>
        </div>

        <div class="settings">
            <div>
                <label>Work</label>
                <input type="number" id="workTime" value="25">
            </div>
            <div>
                <label>Break</label>
                <input type="number" id="breakTime" value="5">
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="primary">Start</button>
            <button id="pauseBtn">Stop</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <div class="card tasks">
        <h2>To-Dos</h2>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Add task...">
            <button onclick="addTask()">+</button>
        </div>

        <div id="taskList"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
