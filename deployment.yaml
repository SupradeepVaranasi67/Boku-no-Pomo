apiVersion: apps/v1
kind: Deployment
metadata:
  name: pomo-timer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pomo-timer
  template:
    metadata:
      labels:
        app: pomo-timer
    spec:
      containers:
      - name: pomo-timer
        image: gcr.io/gcp-demo-project-487205/pomo-timer:f8e672c98da886033080ea87f7c0c42303f3d261
        ports:
        - containerPort: 80
