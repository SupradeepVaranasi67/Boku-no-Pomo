apiVersion: apps/v1
kind: Deployment
metadata:
  name: pomo-timer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pomo-timer
  template:
    metadata:
      labels:
        app: pomo-timer
    spec:
      containers:
      - name: pomo-timer
        image: gcr.io/gcp-demo-project-487205/pomo-timer:6a899d8c2cf137c076961e541fddcff3c16de5f2
        ports:
        - containerPort: 80
