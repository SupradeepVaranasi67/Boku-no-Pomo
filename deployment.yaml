apiVersion: apps/v1
kind: Deployment
metadata:
  name: pomo-timer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pomo-timer
  template:
    metadata:
      labels:
        app: pomo-timer
    spec:
      containers:
      - name: pomo-timer
        image: gcr.io/gcp-demo-project-487205/pomo-timer:ac2e2abff0897e10062faec53acdc2fdafa09721
        ports:
        - containerPort: 80
